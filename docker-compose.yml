name: crypto-copilot

services:
  market-state-api:
    build:
      context: .
      dockerfile: services/market-state-api/Dockerfile
    environment:
      MARKET_STATE_API_CONFIG_PATH: /app/configs/prod/ingestion.v1.json
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 1s
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    depends_on:
      market-state-api:
        condition: service_healthy
    ports:
      - "4173:4173"
